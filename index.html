<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keycap Logo Generator</title>
    <style>
      :root {
        --bg: #15171c;
        --panel: #1d2027;
        --panel-2: #252932;
        --line: #2f3440;
        --text: #e6e9ef;
        --muted: #9aa3b2;
        --accent: #5b9dff;
        --accent-2: #36c08a;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font: 14px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: grid;
        grid-template-columns: 1fr 340px;
        grid-template-rows: 100vh;
        overflow: hidden;
      }
      #viewport { position: relative; }
      #viewport canvas { display: block; }
      #hint {
        position: absolute; left: 14px; bottom: 12px; color: var(--muted);
        font-size: 12px; pointer-events: none; user-select: none;
      }
      #busy {
        position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,.6); padding: 6px 14px; border-radius: 20px;
        font-size: 12px; color: var(--text); display: none;
      }
      aside {
        background: var(--panel);
        border-left: 1px solid var(--line);
        overflow-y: auto;
        padding: 16px;
      }
      h1 { font-size: 15px; margin: 0 0 2px; letter-spacing: .2px; }
      .sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
      .section { border-top: 1px solid var(--line); padding: 14px 0; }
      .section:first-of-type { border-top: none; padding-top: 0; }
      .label { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 8px; }

      #gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .icon {
        aspect-ratio: 1; background: var(--panel-2); border: 1px solid var(--line);
        border-radius: 8px; padding: 8px; cursor: pointer; display: grid; place-items: center;
        transition: border-color .12s, transform .12s;
      }
      .icon:hover { border-color: var(--accent); }
      .icon.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
      .icon img { width: 100%; height: 100%; object-fit: contain; filter: invert(1); opacity: .9; }
      .upload {
        margin-top: 10px; display: inline-flex; gap: 6px; align-items: center;
        font-size: 12px; color: var(--accent); cursor: pointer;
      }
      .upload input { display: none; }

      .row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
      .row label { flex: 0 0 88px; color: var(--muted); font-size: 12px; }
      .row input[type=range] { flex: 1; accent-color: var(--accent); }
      .row .val { flex: 0 0 58px; text-align: right; font-variant-numeric: tabular-nums; }
      .row .val input {
        width: 56px; background: var(--panel-2); border: 1px solid var(--line);
        color: var(--text); border-radius: 6px; padding: 3px 6px; text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .colors { display: flex; gap: 18px; }
      .color { display: flex; align-items: center; gap: 8px; }
      .color input[type=color] {
        width: 34px; height: 28px; border: 1px solid var(--line); border-radius: 6px;
        background: none; padding: 0; cursor: pointer;
      }
      .check { display: flex; align-items: center; gap: 8px; color: var(--muted); cursor: pointer; }

      button.primary {
        width: 100%; padding: 11px; border: none; border-radius: 9px; cursor: pointer;
        background: var(--accent); color: #08122a; font-weight: 600; font-size: 14px;
      }
      button.primary:hover { filter: brightness(1.07); }
      button.primary:disabled { opacity: .5; cursor: default; }
      #status { margin-top: 10px; font-size: 12px; color: var(--muted); min-height: 16px; }
      #status.warn { color: #e3b341; }
      #status.err { color: #f0726a; }
      .meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
      code { background: var(--panel-2); padding: 1px 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="viewport">
      <div id="busy">generating…</div>
      <div id="hint">drag to orbit · scroll to zoom · right-drag to pan</div>
    </div>

    <aside>
      <h1>Keycap Logo Generator</h1>
      <div class="sub">Pick an icon, size it, export a two-color 3MF.</div>

      <div class="section">
        <div class="label">Icon</div>
        <div id="gallery"></div>
        <label class="upload">
          + Upload SVG(s)
          <input id="upload" type="file" accept=".svg,image/svg+xml" multiple />
        </label>
      </div>

      <div class="section">
        <div class="label">Placement &amp; size</div>
        <div class="row">
          <label>Size</label>
          <input id="size" type="range" min="3" max="16" step="0.1" value="8" />
          <span class="val"><input id="sizeNum" type="number" step="0.1" /> mm</span>
        </div>
        <div class="row">
          <label>Depth</label>
          <input id="depth" type="range" min="0.2" max="1.5" step="0.05" value="0.5" />
          <span class="val"><input id="depthNum" type="number" step="0.05" /> mm</span>
        </div>
        <div class="row">
          <label>Rotation</label>
          <input id="rot" type="range" min="-180" max="180" step="1" value="0" />
          <span class="val"><input id="rotNum" type="number" step="1" /> °</span>
        </div>
        <div class="row">
          <label>Nudge X</label>
          <input id="offx" type="range" min="-5" max="5" step="0.1" value="0" />
          <span class="val"><input id="offxNum" type="number" step="0.1" /> mm</span>
        </div>
        <div class="row">
          <label>Nudge Y</label>
          <input id="offy" type="range" min="-5" max="5" step="0.1" value="0" />
          <span class="val"><input id="offyNum" type="number" step="0.1" /> mm</span>
        </div>
        <label class="check"><input id="mirror" type="checkbox" /> Mirror horizontally</label>
      </div>

      <div class="section">
        <div class="label">Colors (preview &amp; 3MF)</div>
        <div class="colors">
          <div class="color"><input id="capColor" type="color" value="#1c1c1e" /> Keycap</div>
          <div class="color"><input id="logoColor" type="color" value="#f2f2f2" /> Logo</div>
        </div>
      </div>

      <div class="section">
        <button id="export" class="primary" disabled>Export 3MF</button>
        <div id="status">Loading…</div>
        <div class="meta" id="meta"></div>
      </div>
    </aside>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
